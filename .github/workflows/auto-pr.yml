name: Auto Pull Request

on:
  push:
    branches-ignore:
      - main
      - master

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr view "${{ github.ref_name }}" --base main || \
          gh pr create \
            --base main \
            --head "${{ github.ref_name }}" \
            --title "chore: merge ${{ github.ref_name }} into main" \
            --body "Auto-created PR from \`${{ github.ref_name }}\` to \`main\`."
